name: Build and Upload to PyPI

on:
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }} (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64
            cibw_archs: x86_64
          - os: windows-latest
            arch: x86_64
            cibw_archs: AMD64
          - os: macos-15
            arch: arm64
            cibw_archs: arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install cibuildwheel and twine
        run: python -m pip install --upgrade cibuildwheel twine

      - name: Build wheels and upload
        run: |
          python -m cibuildwheel --output-dir wheelhouse
          twine upload wheelhouse/* --skip-existing

        env:
          CIBW_BUILD: cp310-* cp311-* cp312-* cp313-*
          CIBW_SKIP: "*-win32 *-manylinux_i686 *-musllinux_i686"
          CIBW_ARCHS: ${{ matrix.cibw_archs }}
          CIBW_BEFORE_BUILD_MACOS: brew install libomp
          CIBW_ENVIRONMENT_MACOS: LIBOMP_PREFIX=$(brew --prefix libomp) MACOSX_DEPLOYMENT_TARGET=15.0
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
